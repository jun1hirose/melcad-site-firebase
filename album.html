<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <title>MELCAD友の会 Gallery</title>
    <meta name="description" content="MELCAD友の会 Gallery">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <link rel="stylesheet" type="text/css"
        href="https://coco-factory.jp/ugokuweb/wp-content/themes/ugokuweb/data/reset.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.10.0/css/lightbox.min.css" />
    <link rel="stylesheet" type="text/css" href="css/6-2-1.css">
    <style>
    .guide-message {
        position: fixed;
        right: 15px;
        bottom: 15px;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 14px;
        z-index: 9999; /* Lightboxより手前に出す場合は調整 */
        pointer-events: none; /* クリックを透過させたい場合 */
    }
    </style>
</head>

<body>
    <div class="wrapper">
        <h2 id="gallery-title">MELCAD友の会 Gallery</h2>
        <ul class="gallery" id="gallery"></ul>
    </div>
    <div class="guide-message">画像をタップすると拡大表示します</div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.10.0/js/lightbox.min.js"></script>
    <script src="https://coco-factory.jp/ugokuweb/wp-content/themes/ugokuweb/data/6-2-1/js/6-2-1.js"></script>
    <script>
        const apiKey = 'AIzaSyDyS860SraB3Qv6CVBrWPLJI28DZbcvGys';
        const rootFolderId = '1r9PCGwWZUjrbawEWTo7r4auk0xM5a-oB';
        const imgFolderName = 'img';

        function getFolderNameFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.keys().next().value;
        }

        function fetchFolderId(parentId, folderName) {
            const q = `'${parentId}' in parents and name='${folderName.replace(/'/g, "\\'")}' and mimeType='application/vnd.google-apps.folder'`;
            const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&key=${apiKey}&fields=files(id,name)`;
            return fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.files && data.files.length > 0) {
                        return data.files[0].id;
                    }
                    throw new Error('指定されたフォルダが見つかりません。');
                });
        }

        function fetchEventFolderId(eventName) {
            return fetchFolderId(rootFolderId, imgFolderName)
                .then(imgFolderId => fetchFolderId(imgFolderId, eventName));
        }

        function fetchImages(subFolderId, folderName) {
            const url = `https://www.googleapis.com/drive/v3/files?q='${subFolderId}'+in+parents&key=${apiKey}&fields=files(id,name,mimeType,thumbnailLink)`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    const gallery = document.getElementById('gallery');
                    const galleryTitle = document.getElementById('gallery-title');
                    galleryTitle.textContent = `MELCAD友の会 Gallery (${folderName})`;
                    const sortedFiles = data.files.sort((a, b) => a.name.localeCompare(b.name, 'ja'));

                    //sortedFiles.forEach(file => {
                    data.files.forEach(file => {
                        if (file.mimeType.startsWith('image/')) {
                            const listItem = document.createElement('li');
                            const link = document.createElement('a');
                            //link.href = `https://drive.google.com/uc?id=${file.id}`;
                            link.href = `https://lh3.googleusercontent.com/d/${file.id}`;
                            link.setAttribute('data-lightbox', `MELCAD友の会 Gallery (${folderName})`);
                            link.setAttribute('data-title', file.name);
                            console.log("file.name:" + file.name);
                            const img = document.createElement('img');
                            img.src = file.thumbnailLink;
                            //img.src = file.webViewLink;
                            img.alt = file.name;

                            link.appendChild(img);
                            listItem.appendChild(link);
                            gallery.appendChild(listItem);
                        }
                    });
                })
                .catch(error => console.error('Error fetching images:', error));
        }

        document.addEventListener('DOMContentLoaded', () => {
            const folderName = getFolderNameFromUrl();
            if (folderName) {
                fetchEventFolderId(folderName)
                    .then(eventFolderId => fetchImages(eventFolderId, folderName))
                    .catch(error => console.error(error.message));
            } else {
                console.error('フォルダ名が指定されていません。');
            }
        });
    </script>
</body>

</html>
