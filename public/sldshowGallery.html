<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Slideshow</title>
  <style>
    body::-webkit-scrollbar { display:none; }
    html { font-size: 200%; background:#000; }
    #slideshow { width:auto; height:auto; margin:auto; }
    .transition { position:absolute; width:100%; height:100%; opacity:0; }
    img { object-fit:contain; display:block; opacity:0; }
    .active img { opacity:1; }

    .membername, .caption, .shotLocation {
      color:#fff; position:fixed; bottom:1px; background:#000; opacity:0.5;
    }
    .membername { left:10px; }
    .caption { left:50%; transform:translateX(-50%); }
    .shotLocation { right:10px; }

    .slide .transition, .slide .caption, .slide .shotLocation, .slide .membername {
      opacity:0;
      transition-duration: opacity 1.0s ease-in-out;
    }
    .active .transition {
      transform: scale(1.3);
      transition: opacity 2.0s, transform 8.0s linear;
      opacity:1.0;
    }
    .active .caption, .active .shotLocation, .active .membername { opacity:0.5; }
  </style>
</head>

<body>
  <div id="slideshow"></div>

  <script>
    // ★ここが重要：フロントには apiKey を置かない
    // 画像一覧も Functions 経由で取得する
    const CONFIG = {
      listApi: "/api/drive/list",
      mediaApi: "/api/drive", // 既存：fileId で本文/メディア取得
    };

    function qsGet(name) {
      return new URLSearchParams(location.search).get(name) || "";
    }

    function setText(el, text) {
      while (el.firstChild) el.removeChild(el.firstChild);
      el.appendChild(document.createTextNode(text));
    }

    async function fetchJson(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error("HTTP_" + r.status);
      return r.json();
    }

    async function loadImagesByFolderId(folderId, titleText) {
      // 1) フォルダ内画像一覧を取得（Functions -> Drive API）
      const listUrl = new URL(CONFIG.listApi, location.origin);
      listUrl.searchParams.set("parentId", folderId);

      const data = await fetchJson(listUrl.toString());
      const files = Array.isArray(data.files) ? data.files : [];

      if (!files.length) {
        const d = document.createElement("div");
        d.style.color = "#fff";
        d.style.padding = "1rem";
        setText(d, "画像が見つかりませんでした");
        document.getElementById("slideshow").appendChild(d);
        return;
      }

      // 2) DOM生成
      const root = document.getElementById("slideshow");
      const allcount = files.length;

      files.forEach((file, i) => {
        const spnElem = document.createElement("span");
        const loctElem = document.createElement("span");
        const imgElem = document.createElement("img");
        const memElem = document.createElement("span");

        // 画像は /api/drive?fileId=xxxx で取得（キーはサーバ側）
        const mediaUrl = new URL(CONFIG.mediaApi, location.origin);
        mediaUrl.searchParams.set("fileId", file.id);
        imgElem.src = mediaUrl.toString();

        loctElem.classList.add("shotLocation");
        const currenti = i + 1;
        setText(loctElem, `　${currenti}/${allcount}　`);

        memElem.classList.add("membername");
        setText(memElem, titleText);

        spnElem.classList.add("slide");
        imgElem.classList.add("transition");

        spnElem.appendChild(imgElem);
        spnElem.appendChild(loctElem);
        spnElem.appendChild(memElem);

        root.appendChild(spnElem);
      });

      startSlideshow();
    }

    async function startSlideshow() {
      const slides = document.querySelectorAll(".slide");
      if (!slides.length) return;

      let index = 0;
      slides[index].classList.add("active");

      setInterval(() => {
        if (slides[index].classList.contains("active")) {
          slides[index].classList.remove("active");
        }
        index = (index + 1) % slides.length;
        slides[index].classList.add("active");
      }, 8000);
    }

    (async function main() {
      try {
        // ★必須：folderId をクエリで渡す
        // 例: sldshowGallery.html?folderId=xxxxx&title=2026_0310
        const folderId = qsGet("folderId");
        const titleText = qsGet("title") || "slideshow";

        if (!folderId) {
          const d = document.createElement("div");
          d.style.color = "#fff";
          d.style.padding = "1rem";
          setText(d, "URLに folderId がありません。例: ?folderId=xxxxx&title=2026_0310");
          document.getElementById("slideshow").appendChild(d);
          return;
        }

        await loadImagesByFolderId(folderId, titleText);
      } catch (e) {
        console.error(e);
        const d = document.createElement("div");
        d.style.color = "#fff";
        d.style.padding = "1rem";
        setText(d, "エラー: " + String(e.message || e));
        document.getElementById("slideshow").appendChild(d);
      }
    })();
  </script>
</body>
</html>
